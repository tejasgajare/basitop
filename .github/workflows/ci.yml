name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: test (${{ matrix.os }})
    # Apple Silicon runner — sysinfo / macmon depend on macOS
    # ARM-only IOKit symbols, so the project doesn't build on
    # Linux or Intel Mac. macos-14+ runners are M1.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo build
        run: cargo build --verbose

      - name: cargo test
        # Hardware-dependent integration tests (PM_LIVE / PM_DUMP)
        # are skipped automatically when those env vars are unset.
        run: cargo test --verbose
